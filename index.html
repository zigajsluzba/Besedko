<!doctype html>
<html lang="sl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Besedko+</title>
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body>
    <header class="header">
      <h1>Besedko+</h1>
      <div class="header-actions">
        <div class="mode-switch" role="group" aria-label="Način igre">
          <button class="mode-button active" id="mode-single" type="button">Single</button>
          <button class="mode-button" id="mode-multi" type="button">Multi</button>
        </div>
        <div id="daily-mode" class="daily-mode" aria-live="polite">Daily</div>
        <div id="stats-summary" class="stats-summary" aria-live="polite">0/0</div>
        <div id="round-summary" class="round-summary" aria-live="polite">1/1</div>
        <button class="icon-button" id="hint-button" aria-label="Namig">💡</button>
        <button class="icon-button" id="new-game-button" aria-label="Nova igra">↺</button>
        <button class="icon-button" id="stats-button" aria-label="Odpri statistiko">📊</button>
      </div>
    </header>

    <main>
      <!-- Multiplayer panel (hidden in single mode) -->
      <div class="multiplayer-panel">

        <!-- PRE-ROOM: shown when NOT in a room -->
        <div id="mp-preroom">
          <div class="mp-actions">
            <button id="multiplayer-create" class="secondary-button" type="button">Ustvari sobo</button>
            <button id="multiplayer-join" class="secondary-button" type="button">Pridruži se</button>
          </div>
          <div class="mp-settings" id="mp-settings">
            <div class="mp-setting-group">
              <span class="mp-label">Tema</span>
              <div class="mp-topic-buttons" id="mp-topic-buttons" role="group" aria-label="Tema"></div>
            </div>
            <div class="mp-setting-group">
              <span class="mp-label">Dolžina</span>
              <div class="mp-length-buttons" role="group" aria-label="Dolžina besede">
                <button class="mp-length-btn" data-length="4" type="button">4</button>
                <button class="mp-length-btn active" data-length="5" type="button">5</button>
                <button class="mp-length-btn" data-length="6" type="button">6</button>
              </div>
            </div>
            <div class="mp-setting-group">
              <span class="mp-label">Poskusi</span>
              <div class="mp-length-buttons" role="group" aria-label="Število poskusov">
                <button class="mp-rows-btn" data-rows="3" type="button">3</button>
                <button class="mp-rows-btn" data-rows="4" type="button">4</button>
                <button class="mp-rows-btn" data-rows="5" type="button">5</button>
                <button class="mp-rows-btn active" data-rows="6" type="button">6</button>
                <button class="mp-rows-btn" data-rows="7" type="button">7</button>
                <button class="mp-rows-btn" data-rows="8" type="button">8</button>
              </div>
            </div>
          </div>
        </div>

        <!-- IN-ROOM: shown when actively in a room -->
        <div id="mp-inroom" hidden>
          <div class="mp-room-row">
            <div class="mp-room-cell">
              <span class="mp-label">Soba</span>
              <strong id="mp-room-code-display" class="mp-room-value">–</strong>
            </div>
            <div class="mp-room-cell">
              <span class="mp-label">Vzdevek</span>
              <strong id="mp-my-name" class="mp-room-value">–</strong>
            </div>
            <button id="multiplayer-leave" class="secondary-button mp-leave-btn" type="button">Zapusti ✕</button>
          </div>
          <!-- Host confirmation: shown when a guest requests to join -->
          <div id="mp-confirm" class="mp-confirm" hidden>
            <span id="mp-confirm-text" class="mp-confirm-text">Nekdo želi vstopiti.</span>
            <div class="mp-confirm-btns">
              <button id="mp-confirm-yes" class="secondary-button mp-btn-yes" type="button">✓ Sprejmi</button>
              <button id="mp-confirm-no" class="secondary-button mp-btn-no" type="button">✕ Zavrni</button>
            </div>
          </div>
        </div>

        <div id="multiplayer-status" class="multiplayer-status" aria-live="polite">Izberi način igre.</div>
        <p class="mp-hint">Deluje med napravami (računalnik ↔ telefon) prek Firebase.</p>
      </div>

      <!-- Game boards: my board + opponent board side by side in multiplayer -->
      <div class="boards-container" id="boards-container">
        <div class="board-wrapper" id="my-board-wrapper">
          <div class="board-label" id="my-board-label">Jaz</div>
          <section id="board" class="board" tabindex="0" aria-label="Moja tabla"></section>
        </div>
        <div class="board-wrapper board-wrapper--opponent" id="opponent-board-wrapper" hidden>
          <div class="board-label" id="opponent-label">Nasprotnik</div>
          <section id="opponent-board" class="board board--opponent" aria-label="Nasprotnikova tabla"></section>
        </div>
      </div>

      <section id="keyboard" class="keyboard" aria-label="Tipkovnica"></section>
      <div id="message" class="message" aria-live="assertive" role="alert"></div>
    </main>

    <!-- Stats modal -->
    <div id="stats-modal" class="stats-modal" role="dialog" aria-modal="true" aria-labelledby="stats-title">
      <div class="stats-panel">
        <header class="stats-header">
          <h2 id="stats-title">Statistika</h2>
          <button id="stats-close" class="close-button" aria-label="Zapri statistiko">×</button>
        </header>
        <div class="stats-content">
          <div class="stat-row"><span>Odigrane igre</span><strong id="stats-played">0</strong></div>
          <div class="stat-row"><span>Zmage</span><strong id="stats-wins">0</strong></div>
        </div>
        <button id="stats-new-game-button" class="secondary-button" type="button" style="margin-top:16px;width:100%">Nova igra</button>
      </div>
    </div>

    <script type="module" src="js/app.js?v=20260626-8"></script>
  </body>
</html>

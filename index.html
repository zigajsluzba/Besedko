<!doctype html>
<html lang="sl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Besedko+</title>
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body>
    <header class="header">
      <h1>Besedko+</h1>
      <div class="header-actions">
        <div class="mode-switch" role="group" aria-label="Način igre">
          <button class="mode-button active" id="mode-single" type="button">Single</button>
          <button class="mode-button" id="mode-multi" type="button">Multi</button>
        </div>
        <div id="daily-mode" class="daily-mode" aria-live="polite">Daily</div>
        <div id="stats-summary" class="stats-summary" aria-live="polite">0/0</div>
        <div id="round-summary" class="round-summary" aria-live="polite">1/1</div>
        <button class="icon-button" id="hint-button" aria-label="Namig">💡</button>
        <button class="icon-button" id="new-game-button" aria-label="Nova igra">↺</button>
        <button class="icon-button" id="stats-button" aria-label="Odpri statistiko">📊</button>
        <!-- Auth: shows login button when logged out, user chip when logged in -->
        <button class="icon-button auth-header-btn" id="auth-btn" aria-label="Prijava">👤</button>
        <button class="auth-user-chip" id="auth-user-chip" hidden aria-label="Profil">
          <span class="auth-avatar" id="auth-avatar" aria-hidden="true"></span>
          <span class="auth-chip-name" id="auth-chip-name"></span>
        </button>
      </div>
    </header>

    <main>
      <!-- Multiplayer panel (hidden in single mode) -->
      <div class="multiplayer-panel">

        <!-- PRE-ROOM: just two buttons -->
        <div id="mp-preroom">
          <div class="mp-actions">
            <button id="multiplayer-create" class="secondary-button" type="button">Ustvari sobo</button>
            <button id="multiplayer-join" class="secondary-button" type="button">Pridruži se</button>
          </div>
        </div>

        <!-- IN-ROOM: room info + leave + confirm (confirm only shows on request) -->
        <div id="mp-inroom" hidden>
          <div class="mp-room-row">
            <div class="mp-room-cell">
              <span class="mp-label">Soba</span>
              <strong id="mp-room-code-display" class="mp-room-value">–</strong>
            </div>
            <div class="mp-room-cell">
              <span class="mp-label">Vzdevek</span>
              <strong id="mp-my-name" class="mp-room-value">–</strong>
            </div>
            <div class="mp-room-cell">
              <span class="mp-label">Tema</span>
              <strong id="mp-room-topic-display" class="mp-room-value">–</strong>
            </div>
            <button id="multiplayer-leave" class="secondary-button mp-leave-btn" type="button">Zapusti ✕</button>
          </div>
          <div id="mp-confirm" class="mp-confirm" hidden>
            <span id="mp-confirm-text" class="mp-confirm-text">Nekdo želi vstopiti.</span>
            <div class="mp-confirm-btns">
              <button id="mp-confirm-yes" class="secondary-button mp-btn-yes" type="button">✓ Sprejmi</button>
              <button id="mp-confirm-no" class="secondary-button mp-btn-no" type="button">✕ Zavrni</button>
            </div>
          </div>
        </div>

        <div id="multiplayer-status" class="multiplayer-status" aria-live="polite"></div>
      </div>

      <!-- Game boards -->
      <div class="boards-container" id="boards-container">
        <div class="board-wrapper" id="my-board-wrapper">
          <div class="board-label" id="my-board-label">Jaz</div>
          <section id="board" class="board" tabindex="0" aria-label="Moja tabla"></section>
        </div>
        <div class="board-wrapper board-wrapper--opponent" id="opponent-board-wrapper" hidden>
          <div class="board-label" id="opponent-label">Nasprotnik</div>
          <section id="opponent-board" class="board board--opponent" aria-label="Nasprotnikova tabla"></section>
        </div>
      </div>

      <section id="keyboard" class="keyboard" aria-label="Tipkovnica"></section>
      <div id="message" class="message" aria-live="assertive" role="alert"></div>
    </main>

    <!-- Stats modal -->
    <div id="stats-modal" class="stats-modal" role="dialog" aria-modal="true" aria-labelledby="stats-title">
      <div class="stats-panel">
        <header class="stats-header">
          <h2 id="stats-title">Statistika</h2>
          <button id="stats-close" class="close-button" aria-label="Zapri statistiko">×</button>
        </header>
        <div class="stats-content">
          <div class="stat-row"><span>Odigrane igre</span><strong id="stats-played">0</strong></div>
          <div class="stat-row"><span>Zmage</span><strong id="stats-wins">0</strong></div>
        </div>
        <button id="stats-new-game-button" class="secondary-button" type="button" style="margin-top:16px;width:100%">Nova igra</button>
      </div>
    </div>

    <!-- Create room modal -->
    <div id="mp-create-modal" class="stats-modal" role="dialog" aria-modal="true" aria-labelledby="mp-create-title">
      <div class="stats-panel mp-modal-panel">
        <header class="stats-header">
          <h2 id="mp-create-title">Ustvari sobo</h2>
          <button id="mp-create-close" class="close-button" aria-label="Zapri">×</button>
        </header>
        <div class="mp-modal-body">
          <div class="mp-modal-field">
            <label class="mp-label" for="mp-modal-nickname">Vzdevek</label>
            <input type="text" id="mp-modal-nickname" class="mp-text-input" placeholder="Igralec" maxlength="20" autocomplete="off" />
          </div>
          <div class="mp-settings" id="mp-settings">
            <div class="mp-setting-group">
              <span class="mp-label">Tema</span>
              <div class="mp-topic-buttons" id="mp-topic-buttons" role="group" aria-label="Tema"></div>
            </div>
            <div class="mp-setting-group">
              <span class="mp-label">Dolžina</span>
              <div class="mp-length-buttons" role="group" aria-label="Dolžina besede">
                <button class="mp-length-btn" data-length="4" type="button">4</button>
                <button class="mp-length-btn active" data-length="5" type="button">5</button>
                <button class="mp-length-btn" data-length="6" type="button">6</button>
              </div>
            </div>
            <div class="mp-setting-group">
              <span class="mp-label">Poskusi</span>
              <div class="mp-length-buttons" role="group" aria-label="Število poskusov">
                <button class="mp-rows-btn" data-rows="3" type="button">3</button>
                <button class="mp-rows-btn" data-rows="4" type="button">4</button>
                <button class="mp-rows-btn" data-rows="5" type="button">5</button>
                <button class="mp-rows-btn active" data-rows="6" type="button">6</button>
                <button class="mp-rows-btn" data-rows="7" type="button">7</button>
                <button class="mp-rows-btn" data-rows="8" type="button">8</button>
              </div>
            </div>
          </div>
          <button id="mp-modal-create-btn" class="secondary-button mp-modal-confirm-btn" type="button">Ustvari sobo →</button>
        </div>
      </div>
    </div>

    <!-- Join room modal -->
    <div id="mp-join-modal" class="stats-modal" role="dialog" aria-modal="true" aria-labelledby="mp-join-title">
      <div class="stats-panel mp-modal-panel">
        <header class="stats-header">
          <h2 id="mp-join-title">Pridruži se sobi</h2>
          <button id="mp-join-close" class="close-button" aria-label="Zapri">×</button>
        </header>
        <div class="mp-modal-body">
          <div class="mp-modal-field">
            <label class="mp-label" for="mp-join-nickname">Vzdevek</label>
            <input type="text" id="mp-join-nickname" class="mp-text-input" placeholder="Igralec" maxlength="20" autocomplete="off" />
          </div>
          <div class="mp-modal-field">
            <label class="mp-label" for="mp-join-code">Koda sobe</label>
            <input type="text" id="mp-join-code" class="mp-text-input mp-code-input" placeholder="XXXXX" maxlength="5" autocomplete="off" />
          </div>
          <button id="mp-modal-join-btn" class="secondary-button mp-modal-confirm-btn" type="button">Pridruži se →</button>
        </div>
      </div>
    </div>

    <!-- Auth modal -->
    <div id="auth-modal" class="stats-modal" role="dialog" aria-modal="true" aria-labelledby="auth-modal-title">
      <div class="stats-panel auth-modal-panel">
        <!-- Logged-out view -->
        <div id="auth-view-login">
          <header class="stats-header">
            <h2 id="auth-modal-title">Prijava</h2>
            <button id="auth-close" class="close-button" aria-label="Zapri">×</button>
          </header>
          <div class="auth-modal-body">
            <button id="auth-google-btn" class="auth-google-btn" type="button">
              <span class="auth-google-g">G</span>
              Prijavi se z Google
            </button>
            <div class="auth-divider"><span>ali z e-pošto</span></div>
            <div class="mp-modal-field">
              <label class="mp-label" for="auth-name-input">Ime (za registracijo)</label>
              <input type="text" id="auth-name-input" class="mp-text-input" placeholder="Žiga" maxlength="30" autocomplete="name" />
            </div>
            <div class="mp-modal-field">
              <label class="mp-label" for="auth-email">E-naslov</label>
              <input type="email" id="auth-email" class="mp-text-input" placeholder="ime@primer.si" autocomplete="email" />
            </div>
            <div class="mp-modal-field">
              <label class="mp-label" for="auth-password">Geslo</label>
              <input type="password" id="auth-password" class="mp-text-input" placeholder="••••••••" autocomplete="current-password" />
            </div>
            <div class="auth-actions">
              <button id="auth-signin-btn" class="secondary-button mp-modal-confirm-btn" type="button">Prijavi se →</button>
              <button id="auth-register-btn" class="secondary-button" type="button">Registracija</button>
            </div>
            <div id="auth-error" class="auth-error" hidden></div>
          </div>
        </div>
        <!-- Logged-in view -->
        <div id="auth-view-profile" hidden>
          <header class="stats-header">
            <h2 id="auth-modal-title-profile">Profil</h2>
            <button id="auth-close-profile" class="close-button" aria-label="Zapri">×</button>
          </header>
          <div class="auth-profile-body">
            <div class="auth-profile-avatar" id="auth-profile-avatar"></div>
            <div class="auth-profile-name" id="auth-profile-name"></div>
            <div class="auth-profile-email" id="auth-profile-email"></div>
            <button id="auth-logout-btn" class="secondary-button auth-logout-btn" type="button">Odjavi se</button>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="js/app.js?v=20260626-11"></script>
  </body>
</html>
